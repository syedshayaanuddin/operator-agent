<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Workaround for environments where window.fetch has only a getter
      // Suppresses "Cannot set property fetch of #<Window> which has only a getter"
      try {
        const originalFetch = window.fetch;
        if (originalFetch) {
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: (val) => {
              console.warn("Intercepted attempt to overwrite window.fetch");
            },
            configurable: true
          });
        }
      } catch (e) {
        console.warn("Failed to patch window.fetch", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
